<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineGalaxy - Star Wars Saga</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --yellow:#FFE81F;--yellow50:rgba(255,232,31,.5);--yellow25:rgba(255,232,31,.25);
      --yellow10:rgba(255,232,31,.1);--yellow05:rgba(255,232,31,.05);
      --dark:#020208;--card:rgba(10,10,30,.6);--bdr:rgba(255,232,31,.08)
    }
    html{scroll-behavior:smooth}
    body{font-family:'Rajdhani',sans-serif;background:var(--dark);color:#ccc;
      min-height:100vh;overflow-x:hidden}
    ::selection{background:rgba(255,232,31,.25);color:#fff}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(255,232,31,.2);border-radius:10px}

    #stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
    .nebula{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;
      background:radial-gradient(ellipse 80% 60% at 20% 80%,rgba(20,0,60,.3) 0%,transparent 70%),
      radial-gradient(ellipse 60% 50% at 85% 20%,rgba(80,10,10,.2) 0%,transparent 70%),
      radial-gradient(ellipse 90% 40% at 50% 100%,rgba(10,10,60,.35) 0%,transparent 60%)}
    #embers{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}

    .wrap{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column}

    /* ===== HERO ===== */
    .hero{text-align:center;padding:90px 24px 30px}
    .hero-tag{font-family:'Orbitron',sans-serif;font-size:.7rem;letter-spacing:.5em;
      text-transform:uppercase;color:var(--yellow50);margin-bottom:14px;opacity:0;
      animation:fadeUp 1s .3s forwards}
    .hero h1{font-family:'Orbitron',sans-serif;font-size:clamp(2rem,7vw,4.8rem);font-weight:900;
      letter-spacing:.1em;text-transform:uppercase;color:var(--yellow);line-height:1.1;opacity:0;
      text-shadow:0 0 20px rgba(255,232,31,.5),0 0 80px rgba(255,232,31,.15);
      animation:heroIn 1.2s .5s forwards}
    .hero h1 small{display:block;font-size:.4em;font-weight:400;letter-spacing:.35em;
      color:var(--yellow50);margin-top:10px;text-shadow:none}
    .hero .desc{font-size:clamp(.85rem,1.5vw,1rem);color:rgba(255,255,255,.3);
      letter-spacing:.08em;margin-top:20px;font-weight:300;opacity:0;
      animation:fadeUp 1s .9s forwards}
    .hero .bar{width:80px;height:1px;margin:35px auto 0;
      background:linear-gradient(90deg,transparent,var(--yellow50),transparent);opacity:0;
      animation:fadeUp 1s 1.1s forwards}

    .sec-label{font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:.4em;
      text-transform:uppercase;color:rgba(255,232,31,.25);text-align:center;padding:0 24px 36px;
      opacity:0;transform:translateY(15px);transition:all .8s ease}
    .sec-label.on{opacity:1;transform:translateY(0)}

    .movies{flex:1;padding:0 32px 90px;max-width:1280px;margin:0 auto;width:100%}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:22px}

    /* ===== CARD ===== */
    .card{position:relative;border-radius:6px;overflow:hidden;cursor:pointer;
      opacity:0;transform:translateY(50px) scale(.96);
      transition:opacity .7s ease,transform .7s cubic-bezier(.22,1,.36,1);perspective:800px}
    .card.on{opacity:1;transform:translateY(0) scale(1)}
    .card-in{position:relative;border-radius:6px;overflow:hidden;border:1px solid var(--bdr);
      transition:border-color .5s,box-shadow .5s;will-change:transform}
    .card:hover .card-in{border-color:rgba(255,232,31,.22);
      box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 80px rgba(255,232,31,.05)}
    .card-in::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;z-index:10;
      background:linear-gradient(90deg,transparent,var(--yellow),transparent);
      opacity:0;transition:opacity .5s}
    .card:hover .card-in::before{opacity:1}

    /* card disabled (coming soon) */
    .card.disabled{cursor:default;filter:brightness(.5) saturate(.3)}
    .card.disabled .play-btn,.card.disabled .play-pulse{display:none}
    .card.disabled .info .go{display:none}

    .poster{position:relative;overflow:hidden;padding-bottom:150%}
    .poster img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;
      transition:transform .7s cubic-bezier(.22,1,.36,1),filter .5s;filter:brightness(.85) saturate(.9)}
    .card:hover .poster img{transform:scale(1.08);filter:brightness(1) saturate(1.1)}
    .card.disabled:hover .poster img{transform:none;filter:brightness(.5) saturate(.3)}
    .poster-fade{position:absolute;bottom:0;left:0;right:0;height:70%;z-index:2;
      background:linear-gradient(to top,rgba(2,2,8,.97) 0%,rgba(2,2,8,.5) 50%,transparent 100%)}
    .poster-scan{position:absolute;top:0;left:0;width:100%;height:100%;z-index:3;
      overflow:hidden;pointer-events:none;opacity:0;transition:opacity .4s}
    .card:hover .poster-scan{opacity:1}
    .poster-scan::after{content:'';position:absolute;left:0;right:0;height:2px;
      background:linear-gradient(90deg,transparent,rgba(255,232,31,.1),transparent);
      animation:scanMove 2.5s linear infinite}

    .badge-ep{position:absolute;top:14px;left:14px;z-index:5;font-family:'Orbitron',sans-serif;
      font-size:.55rem;font-weight:700;letter-spacing:.18em;color:var(--yellow);
      background:rgba(0,0,0,.7);border:1px solid rgba(255,232,31,.18);padding:4px 10px;border-radius:3px;
      backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
    .badge-yr{position:absolute;top:14px;right:14px;z-index:5;font-family:'Orbitron',sans-serif;
      font-size:.5rem;font-weight:500;letter-spacing:.12em;color:rgba(255,255,255,.35);
      background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.06);padding:3px 8px;border-radius:3px;
      backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}

    /* coming soon badge */
    .badge-soon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:8;
      font-family:'Orbitron',sans-serif;font-size:.6rem;font-weight:600;letter-spacing:.2em;
      text-transform:uppercase;color:rgba(255,255,255,.45);
      background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.08);padding:10px 20px;
      border-radius:4px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      pointer-events:none}

    .play-btn{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%) scale(.7);
      z-index:6;width:58px;height:58px;border-radius:50%;
      background:rgba(255,232,31,.08);border:2px solid rgba(255,232,31,.3);
      opacity:0;transition:all .5s cubic-bezier(.22,1,.36,1);
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
    .card:hover .play-btn{opacity:1;transform:translate(-50%,-50%) scale(1)}
    .play-btn::after{content:'';position:absolute;top:50%;left:54%;transform:translate(-50%,-50%);
      width:0;height:0;border-style:solid;border-width:9px 0 9px 16px;
      border-color:transparent transparent transparent var(--yellow)}
    .play-pulse{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);
      width:58px;height:58px;border-radius:50%;border:1px solid rgba(255,232,31,.15);
      z-index:5;opacity:0;transition:opacity .5s;animation:ringPulse 2s ease-out infinite}
    .card:hover .play-pulse{opacity:1}

    .info{position:absolute;bottom:0;left:0;right:0;z-index:5;padding:18px}
    .info h3{font-family:'Orbitron',sans-serif;font-size:.85rem;font-weight:700;
      letter-spacing:.05em;color:#fff;margin-bottom:3px}
    .info .sub{font-size:.73rem;color:rgba(255,255,255,.35);letter-spacing:.04em}
    .info .go{display:inline-flex;align-items:center;gap:5px;margin-top:10px;
      font-family:'Orbitron',sans-serif;font-size:.55rem;letter-spacing:.2em;
      text-transform:uppercase;color:var(--yellow);opacity:0;transform:translateX(-8px);transition:all .4s ease}
    .card:hover .info .go{opacity:1;transform:translateX(0)}
    .info .go b{transition:transform .3s;display:inline-block}
    .card:hover .info .go b{transform:translateX(4px)}

    /* ===== MODAL ===== */
    .modal{position:fixed;top:0;left:0;width:100%;height:100%;z-index:8000;
      display:flex;align-items:center;justify-content:center;padding:16px;
      opacity:0;visibility:hidden;transition:all .4s ease}
    .modal.on{opacity:1;visibility:visible}
    .modal-bg{position:absolute;top:0;left:0;width:100%;height:100%;
      background:rgba(0,0,0,.92);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
    .modal-box{position:relative;width:100%;max-width:1020px;background:#08081a;
      border-radius:8px;overflow:hidden;border:1px solid rgba(255,232,31,.08);
      transform:scale(.9) translateY(25px);transition:transform .5s cubic-bezier(.22,1,.36,1);
      box-shadow:0 40px 100px rgba(0,0,0,.8)}
    .modal.on .modal-box{transform:scale(1) translateY(0)}
    .modal-top{display:flex;align-items:center;gap:14px;padding:14px 18px;
      border-bottom:1px solid rgba(255,255,255,.04);background:rgba(255,255,255,.01)}
    .dots{display:flex;gap:6px}
    .dots i{width:10px;height:10px;border-radius:50%;cursor:pointer;transition:filter .2s}
    .dots i:hover{filter:brightness(1.3)}
    .dots i:nth-child(1){background:#ff5f57}
    .dots i:nth-child(2){background:#febc2e}
    .dots i:nth-child(3){background:#28c840}
    .modal-t{font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:.12em;
      color:rgba(255,255,255,.22)}
    .modal-t b{color:var(--yellow50);font-weight:600}
    .modal-x{margin-left:auto;background:none;border:1px solid rgba(255,255,255,.08);
      color:rgba(255,255,255,.3);font-size:1.1rem;width:30px;height:30px;border-radius:6px;
      cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .modal-x:hover{border-color:rgba(255,232,31,.3);color:var(--yellow);background:rgba(255,232,31,.05)}

    .vid-wrap{position:relative;width:100%;padding-bottom:56.25%;background:#000}
    .vid-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}

    /* loading spinner */
    .vid-loading{position:absolute;top:0;left:0;width:100%;height:100%;
      display:flex;align-items:center;justify-content:center;background:#08081a;z-index:3;
      flex-direction:column;gap:16px;transition:opacity .5s}
    .vid-loading.hide{opacity:0;pointer-events:none}
    .spinner{width:36px;height:36px;border:2px solid rgba(255,232,31,.15);
      border-top-color:var(--yellow);border-radius:50%;animation:spin .8s linear infinite}
    .vid-loading span{font-family:'Orbitron',sans-serif;font-size:.55rem;letter-spacing:.15em;
      color:rgba(255,255,255,.2);text-transform:uppercase}

    .modal-btm{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;
      border-top:1px solid rgba(255,255,255,.04);background:rgba(255,255,255,.01)}
    .modal-btm span{font-size:.6rem;letter-spacing:.1em;color:rgba(255,255,255,.18)}
    .dot-live{display:inline-block;width:5px;height:5px;border-radius:50%;
      background:#28c840;margin-right:7px;animation:liveP 2s ease infinite}

    footer{text-align:center;padding:35px 24px;border-top:1px solid rgba(255,255,255,.03)}
    footer p{font-family:'Orbitron',sans-serif;font-size:.5rem;letter-spacing:.4em;
      text-transform:uppercase;color:rgba(255,255,255,.12)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes heroIn{0%{opacity:0;transform:scale(1.06);filter:blur(4px);letter-spacing:.25em}
      100%{opacity:1;transform:scale(1);filter:blur(0);letter-spacing:.1em}}
    @keyframes scanMove{0%{top:-5%}100%{top:105%}}
    @keyframes ringPulse{0%{width:58px;height:58px;opacity:.6}100%{width:95px;height:95px;opacity:0}}
    @keyframes liveP{0%,100%{opacity:1;box-shadow:0 0 4px #28c840}50%{opacity:.3;box-shadow:none}}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:768px){
      .grid{grid-template-columns:repeat(2,1fr);gap:14px}
      .movies{padding:0 14px 70px}
      .hero{padding-top:55px}
      .play-btn{width:46px;height:46px}
      .play-btn::after{border-width:7px 0 7px 13px}
      .badge-ep{font-size:.48rem;padding:3px 7px;top:8px;left:8px}
      .badge-yr{font-size:.44rem;padding:2px 6px;top:8px;right:8px}
      .badge-soon{font-size:.5rem;padding:8px 14px}
      .info{padding:12px}
      .info h3{font-size:.75rem}
      .info .sub{font-size:.65rem}
    }
    @media(max-width:420px){
      .grid{grid-template-columns:1fr 1fr;gap:8px}
      .info h3{font-size:.65rem}
      .info .sub{font-size:.58rem}
      .info .go{display:none}
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="nebula"></div>
<canvas id="embers"></canvas>

<div class="wrap">
  <header class="hero">
    <p class="hero-tag">Uma galaxia muito, muito distante...</p>
    <h1>STAR WARS<small>A Saga Completa</small></h1>
    <p class="desc">Selecione um filme para iniciar a projecao holografica</p>
    <div class="bar"></div>
  </header>

  <p class="sec-label" id="secLbl">// Selecionar Episodio //</p>

  <section class="movies">
    <div class="grid" id="grid"></div>
  </section>

  <footer><p>May the Force be with you</p></footer>
</div>

<div class="modal" id="modal">
  <div class="modal-bg" id="mBg"></div>
  <div class="modal-box">
    <div class="modal-top">
      <div class="dots"><i id="dotX"></i><i></i><i></i></div>
      <div class="modal-t" id="mT"><b>CineGalaxy</b> // Player</div>
      <button class="modal-x" id="mX">&#x2715;</button>
    </div>
    <div class="vid-wrap" id="mV">
      <div class="vid-loading" id="vidLoading">
        <div class="spinner"></div>
        <span>Conectando ao arquivo...</span>
      </div>
    </div>
    <div class="modal-btm">
      <span><span class="dot-live"></span>Projetando</span>
      <span>Internet Archive &middot; Streaming</span>
    </div>
  </div>
</div>

<script>
// =====================================================
// STARFIELD
// =====================================================
(function(){
  var c=document.getElementById('stars');
  if(!c)return;
  var ctx=c.getContext('2d');
  if(!ctx)return;
  var W,H,arr=[];
  function sz(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;arr=[];init();}
  function init(){
    var n=Math.round(120+(W*H)/20000);
    for(var i=0;i<n;i++)arr.push({
      x:Math.random()*W,y:Math.random()*H,
      r:Math.random()*1+.2,a:Math.random()*.4+.1,
      ts:Math.random()*.008+.003,to:Math.random()*6.283,
      d:(Math.random()-.5)*.012
    });
  }
  function draw(t){
    ctx.clearRect(0,0,W,H);
    for(var i=0;i<arr.length;i++){
      var s=arr[i],al=s.a+Math.sin(t*s.ts+s.to)*.15;
      if(al<.02)al=.02;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.283);
      ctx.fillStyle='rgba(190,200,235,'+al+')';ctx.fill();
      s.y+=s.d;if(s.y<-5)s.y=H+5;if(s.y>H+5)s.y=-5;
    }
    requestAnimationFrame(draw);
  }
  sz();window.addEventListener('resize',sz);requestAnimationFrame(draw);
})();

// =====================================================
// EMBER PARTICLES
// =====================================================
(function(){
  var c=document.getElementById('embers');
  if(!c)return;
  var ctx=c.getContext('2d');
  if(!ctx)return;
  var W=c.width=window.innerWidth,H=c.height=window.innerHeight,ps=[];
  window.addEventListener('resize',function(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;});
  var cols=['rgba(255,232,31,','rgba(255,180,30,','rgba(255,120,40,','rgba(190,195,255,'];
  function sp(){
    return{x:Math.random()*W,y:H+8,vx:(Math.random()-.5)*.2,
      vy:-(Math.random()*.45+.1),lf:0,ml:Math.random()*400+200,
      sz:Math.random()*1.4+.3,cl:cols[Math.random()*4|0],
      wb:Math.random()*6.283,ws:Math.random()*.015+.004};
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    if(ps.length<30&&Math.random()>.65)ps.push(sp());
    for(var i=ps.length-1;i>=0;i--){
      var p=ps[i];p.wb+=p.ws;p.x+=p.vx+Math.sin(p.wb)*.3;p.y+=p.vy;p.lf++;
      var pr=p.lf/p.ml;
      var al=pr<.1?pr*10:pr>.7?(1-pr)/.3:1;
      ctx.beginPath();ctx.arc(p.x,p.y,p.sz*3.5,0,6.283);
      ctx.fillStyle=p.cl+(al*.06)+')';ctx.fill();
      ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,6.283);
      ctx.fillStyle=p.cl+(al*.4)+')';ctx.fill();
      if(p.lf>=p.ml)ps.splice(i,1);
    }
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

// =====================================================
// 3D CARD TILT
// =====================================================
function tilt(card){
  var inner=card.querySelector('.card-in');
  card.addEventListener('mousemove',function(e){
    var r=card.getBoundingClientRect();
    var rx=((e.clientY-r.top-r.height/2)/(r.height/2))*-5;
    var ry=((e.clientX-r.left-r.width/2)/(r.width/2))*5;
    inner.style.transform='perspective(700px) rotateX('+rx+'deg) rotateY('+ry+'deg) scale(1.02)';
  });
  card.addEventListener('mouseleave',function(){
    inner.style.transform='perspective(700px) rotateX(0) rotateY(0) scale(1)';
  });
}

// =====================================================
// MOVIES DATA - Internet Archive
// =====================================================
var ARCHIVE_ID = 'star-wars_202604';

var movies=[
  {file:'01 - Star Wars I - A Amea\u00e7a Fantasma.mp4',t:'A Ameaca Fantasma',s:'Episodio I',e:'EP I',y:'1999',
    img:'https://upload.wikimedia.org/wikipedia/pt/3/30/Star_Wars_Epis%C3%B3dio_1_Amea%C3%A7a_Fantasma.jpg',ready:true},
  
  {file:'02 - Star Wars II - O Ataque Dos Clones.mp4',t:'O Ataque dos Clones',s:'Episodio II',e:'EP II',y:'2002',
    img:'https://upload.wikimedia.org/wikipedia/pt/6/63/Star_Wars_The_Clone_Wars.jpg',ready:true},
  
  {file:'03 - Star Wars III - A Vingan\u00e7a dos Sith.mp4',t:'A Vinganca dos Sith',s:'Episodio III',e:'EP III',y:'2005',
    img:'https://upload.wikimedia.org/wikipedia/pt/5/58/Star_Wars_Epis%C3%B3dio_III_A_Vingan%C3%A7a_dos_Sith.jpg',ready:true},
  
  {file:'04 - Solo - Uma História Star Wars.mp4',t:'Han Solo',s:'Complemento I',e:'Co I',y:'2018',
    img:'https://upload.wikimedia.org/wikipedia/pt/5/5c/Solo_A_Star_Wars_Story.jpg',ready:true},
  
  {file:'05 - Rogue One - Uma Historia Star Wars.mp4',t:'Rogue One',s:'Complemento II',e:'Co II',y:'2016',
    img:'https://upload.wikimedia.org/wikipedia/pt/6/62/Rogue_One_-_A_Star_Wars_Story.jpg',ready:true},
  
  {file:'06 - Star Wars IV - Uma Nova Esperan\u00e7a.mp4',t:'Uma Nova Esperanca',s:'Episodio IV',e:'EP IV',y:'1977',
    img:'https://www.cafecomfilme.com.br/media/k2/items/cache/393ccf232eeba2c1aca5c27106150ff3_S.jpg',ready:true},
  
  {file:'07 - Star Wars V - O Imperio Contra-Ataca.mp4',t:'O Imperio Contra-Ataca',s:'Episodio V',e:'EP V',y:'1980',
    img:'https://m.media-amazon.com/images/M/MV5BY2ViMjFhMDMtNTA4Yi00NGJjLTk0ZTktNGVkZjJjMGY4ZTFkXkEyXkFqcGc@._V1_.jpg',ready:true},
  
  {file:'08 - Star Wars VI - O Retorno de Jedi.mp4',t:'O Retorno de Jedi',s:'Episodio VI',e:'EP VI',y:'1983',
    img:'https://m.media-amazon.com/images/I/91deRWSSdiL._SY466_.jpg',ready:true}
];

// Build embed URL for archive.org
function getEmbedUrl(movie) {
  return 'https://archive.org/embed/' + ARCHIVE_ID + '/' + encodeURIComponent(movie.file);
}

// =====================================================
// BUILD CARDS
// =====================================================
var grid=document.getElementById('grid');
for(var i=0;i<movies.length;i++){
  (function(m,idx){
    var d=document.createElement('div');
    d.className = 'card' + (m.ready ? '' : ' disabled');

    var soonBadge = m.ready ? '' : '<div class="badge-soon">Em breve</div>';

    d.innerHTML='<div class="card-in"><div class="poster">'+
      '<img src="'+m.img+'" alt="'+m.t+'" loading="lazy">'+
      '<div class="poster-fade"></div><div class="poster-scan"></div>'+
      '<span class="badge-ep">'+m.e+'</span>'+
      '<span class="badge-yr">'+m.y+'</span>'+
      soonBadge +
      '<div class="play-pulse"></div><div class="play-btn"></div>'+
      '<div class="info"><h3>'+m.t+'</h3><p class="sub">'+m.s+' &middot; '+m.y+'</p>'+
      '<span class="go">Assistir <b>&rarr;</b></span></div>'+
      '</div></div>';

    if(m.ready){
      d.addEventListener('click',function(){openM(m);});
    }
    grid.appendChild(d);
    if(m.ready) tilt(d);

    var obs=new IntersectionObserver(function(ent){
      ent.forEach(function(en){
        if(en.isIntersecting){setTimeout(function(){d.classList.add('on');},idx*90);obs.unobserve(d);}
      });
    },{threshold:.12});
    obs.observe(d);
  })(movies[i],i);
}

var lObs=new IntersectionObserver(function(ent){
  ent.forEach(function(en){if(en.isIntersecting){en.target.classList.add('on');lObs.unobserve(en.target);}});
},{threshold:.5});
lObs.observe(document.getElementById('secLbl'));

// =====================================================
// MODAL
// =====================================================
var modal=document.getElementById('modal');
var mV=document.getElementById('mV');
var mT=document.getElementById('mT');
var vidLoading=document.getElementById('vidLoading');

function openM(m){
  // show loading
  vidLoading.className='vid-loading';

  // create iframe
  var iframe=document.createElement('iframe');
  iframe.src = getEmbedUrl(m);
  iframe.setAttribute('allow','autoplay;encrypted-media;picture-in-picture;fullscreen');
  iframe.setAttribute('allowfullscreen','');
  iframe.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;border:none;z-index:2';

  // hide loading when iframe loads
  iframe.onload=function(){
    vidLoading.className='vid-loading hide';
  };

  // safety timeout - hide loading after 8s regardless
  setTimeout(function(){
    vidLoading.className='vid-loading hide';
  },8000);

  // clear old iframes
  var old=mV.querySelectorAll('iframe');
  for(var j=0;j<old.length;j++)old[j].remove();

  // reset loading (in case it was hidden from previous)
  vidLoading.className='vid-loading';

  mV.appendChild(iframe);
  mT.innerHTML='<b>CineGalaxy</b> // '+m.t;
  modal.classList.add('on');
  document.body.style.overflow='hidden';
}

function closeM(){
  modal.classList.remove('on');
  document.body.style.overflow='';
  setTimeout(function(){
    var iframes=mV.querySelectorAll('iframe');
    for(var i=0;i<iframes.length;i++)iframes[i].remove();
    vidLoading.className='vid-loading';
  },400);
}

document.getElementById('mX').addEventListener('click',closeM);
document.getElementById('dotX').addEventListener('click',closeM);
document.getElementById('mBg').addEventListener('click',closeM);
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeM();});
</script>
